sources:
  input:
    # Which canonical identity fields must be present after mapping.
    # For the MVP this primarily means having a business/agency name.
    required_any:
      - company_name

    # Map source-specific column/header names into canonical lead fields.
    # Keys and aliases are matched case-insensitively.
    schema_aliases:
      company_name:
        - company_name
        - company
        - agency
        - business
        - business_name
        - businessname
        - listing_context
        - listingcontext
      agent_name:
        - agent_name
        - agent
        - contact_person
        - person
        - representative
      website:
        - website
        - site
        - url
        - homepage
        - domain
      email:
        - email
        - emails
        - contact_email
        - contactemail
        - mail
      phone:
        - phone
        - phones
        - mobile
        - telephone
        - tel
      location:
        - location
        - city
        - town
        - region
        - province
        - state
        - country
      source:
        - source
        - origin
        - lead_source
        - data_source

    # Defaults applied during mapping when fields are missing/empty.
    defaults:
      source: input

  website:
    enabled: true
    discover_with_serper: true
    max_retries: 2
    request_timeout_seconds: 8
    serper_timeout_seconds: 6
    user_agent: "PropIntelBot/0.1 (+https://example.com)"
    email_selectors:
      - "mailto:"
      - ".contact-email"
    phone_patterns:
      - "+27"
      - "+1"
    chatbot_keywords:
      - "chatbot"
      - "live chat"
      - "intercom"
      - "drift"
      - "tawk.to"
      - "zendesk chat"
      - "whatsapp chat"

  google_maps:
    enabled: true
    timeout_seconds: 8
    max_retries: 2
    min_name_match_score: 0.5
    region: "za"
    language: "en"