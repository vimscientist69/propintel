sources:
  input:
    # Which canonical identity fields must be present after mapping.
    # For the MVP this primarily means having a business/agency name.
    required_any:
      - company_name

    # Map source-specific column/header names into canonical lead fields.
    # Keys and aliases are matched case-insensitively.
    schema_aliases:
      company_name:
        - company_name
        - company
        - agency
        - agency_name
        - business
        - business_name
        - businessname
        - listing_context
        - listingcontext
      agent_name:
        - agent_name
        - agent
        - contact_person
        - person
        - representative
      website:
        - website
        - site
        - url
        - homepage
        - domain
      email:
        - email
        - agent_email
        - emails
        - contact_email
        - contactemail
        - mail
      phone:
        - phone
        - phones
        - mobile
        - telephone
        - tel
      location:
        - location
        - city
        - town
        - region
        - province
        - state
        - country
      source:
        - source
        - origin
        - lead_source
        - data_source

    # Defaults applied during mapping when fields are missing/empty.
    defaults:
      source: input

    # When true (default), rows with invalid email/phone/website shapes are rejected at parse time.
    # Set to false only when bad input should flow to enrichment + Week 3 verify_lead (e.g. verification samples).
    strict_contact_validation: true

  website:
    enabled: true
    discover_with_serper: true
    max_retries: 2
    request_timeout_seconds: 8
    serper_timeout_seconds: 6
    user_agent: "PropIntelBot/0.1 (+https://example.com)"
    email_selectors:
      - "mailto:"
      - ".contact-email"
    phone_patterns:
      - "+27"
      - "+1"
    chatbot_keywords:
      - "chatbot"
      - "live chat"
      - "intercom"
      - "drift"
      - "tawk.to"
      - "zendesk chat"
      - "whatsapp chat"

  google_maps:
    enabled: true
    timeout_seconds: 8
    max_retries: 2
    min_name_match_score: 0.5
    region: "za"
    language: "en"

  # Lead scoring (Week 3). Wired in ingestion after verify_lead; see backend/services/scorer.py.
  # When enabled: false, the pipeline leaves lead_score / lead_reason / confidence_score unset (null in JSON exports).
  scoring:
    enabled: true
    base_score: 45
    weights:
      # Contact strength (contact_quality + verification)
      contact_quality_verified: 25
      contact_quality_likely: 10
      contact_quality_low: -15
      both_channels_bonus: 5
      # Chatbot / live widgets on site
      chatbot_penalty: -10
      # Freshness wording in crawl (last_updated_signal)
      last_updated_bonus: 5
      last_updated_unknown_penalty: 0
      has_website: 10
      # Business activity / credibility
      google_maps_source_bonus: 5
      has_location_bonus: 3
      has_agent_name_bonus: 2