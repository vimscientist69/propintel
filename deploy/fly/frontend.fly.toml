app = "propintel-web"
primary_region = "jnb"

[build]
  dockerfile = "deploy/fly/frontend.Dockerfile"

[env]
  BACKEND_UPSTREAM = "propintel-api.internal:8000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
