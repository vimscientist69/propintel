app = "propintel-web"
primary_region = "jnb"

[build]
  dockerfile = "frontend.Dockerfile"
  [build.args]
    VITE_API_BASE_URL = "https://propintel-api.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
